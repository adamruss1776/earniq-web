  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080808;
      --sidebar: #0c0c0c;
      --surface: #111111;
      --surface2: #181818;
      --surface3: #222222;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --text: #f0f0f0;
      --muted: #888;
      --dim: #555;
      --green: #22c55e;
      --green-bg: rgba(34,197,94,0.1);
      --green-border: rgba(34,197,94,0.28);
      --amber: #f59e0b;
      --amber-bg: rgba(245,158,11,0.1);
      --amber-border: rgba(245,158,11,0.28);
      --red: #ef4444;
      --red-bg: rgba(239,68,68,0.1);
      --blue: #60a5fa;
      --blue-bg: rgba(96,165,250,0.1);
      --blue-border: rgba(96,165,250,0.28);
      --sidebar-w: 236px;
      --nav-h: 68px;
      --r: 14px;
    }
    html { scrollbar-color: #333 var(--bg); }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .num { font-family: 'Space Grotesk', 'Inter', sans-serif; font-variant-numeric: tabular-nums; }
    input, select, textarea, button { font-family: inherit; }
    input[type="range"] { accent-color: var(--green); }
    input::placeholder { color: var(--dim); }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--green) !important; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
    @keyframes glowPulse { 0%,100% { box-shadow:0 0 24px rgba(34,197,94,0.10); } 50% { box-shadow:0 0 42px rgba(34,197,94,0.22); } }
    .fu { animation: fadeUp 0.3s ease forwards; }
    .glow { animation: glowPulse 4s ease-in-out infinite; }
    .navlink { display:flex; align-items:center; gap:12px; padding:11px 14px; border-radius:10px; cursor:pointer; color:var(--muted); font-size:13.5px; font-weight:500; border:1px solid transparent; transition: all 0.15s; user-select:none; }
    .navlink:hover { color:var(--text); background:var(--surface2); }
    .navlink.active { color:var(--green); background:var(--green-bg); border-color:var(--green-border); }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); }
    .tr-hover:hover { background:var(--surface2); }
    ::-webkit-scrollbar { width:8px; height:8px; }
    ::-webkit-scrollbar-thumb { background:#2a2a2a; border-radius:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    /* Desktop layout */
    #sidebar { position:fixed; top:0; left:0; bottom:0; width:var(--sidebar-w); background:var(--sidebar); border-right:1px solid var(--border); z-index:300; display:flex; flex-direction:column; padding:22px 14px 18px; }
    #main { margin-left:var(--sidebar-w); min-height:100vh; }
    #mobilenav { display:none; }
    .container { max-width:1240px; margin:0 auto; padding:30px 34px 60px; }

    @media (max-width: 920px) {
      #sidebar { display:none; }
      #main { margin-left:0; }
      #mobilenav { display:flex; position:fixed; bottom:0; left:0; right:0; height:var(--nav-h); background:var(--surface); border-top:1px solid var(--border); z-index:300; padding-bottom:max(env(safe-area-inset-bottom),0px); }

      .grid-hero, .grid-charts, .grid-2 { grid-template-columns:1fr; }
      .grid-stats { grid-template-columns:repeat(2,1fr); }
      .hide-mobile { display:none !important; }
    }

const fmt  = (n) => '$' + Math.round(Math.abs(Number(n)||0)).toLocaleString();
const fmtK = (n) => { n = Math.round(Number(n)||0); return n >= 1000 ? '$' + (n/1000).toFixed(n>=10000?0:1) + 'k' : '$' + n; };
const fmtD = (iso) => {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
};
const calcGross = (deal, plan) => {
  const front = Number(deal.front) || 0;
  const back  = Number(deal.back)  || 0;
  const isUsed = deal.type === 'used';
  const pct = isUsed ? plan.usedFrontPct/100 : plan.newFrontPct/100;
  const cap = isUsed ? plan.usedFrontCap    : plan.newFrontCap;
  const frontComm = plan.capsEnabled ? Math.min(front * pct, cap) : front * pct;
  return Math.round(frontComm + back * plan.backPct/100);
};
const calcMyComm = (deal, plan) => Math.round(calcGross(deal,plan) * (Number(deal.split_pct)||100) / 100);
const isCapped = (deal, plan) => {
  if (!plan.capsEnabled) return false;
  const front = Number(deal.front) || 0;
  const isUsed = deal.type === 'used';
  const pct = isUsed ? plan.usedFrontPct/100 : plan.newFrontPct/100;
  const cap = isUsed ? plan.usedFrontCap    : plan.newFrontCap;
  return front * pct > cap;
};
const getMonth = () => { const d=new Date(); return {m:d.getMonth(),y:d.getFullYear()}; };
const getYear  = () => new Date().getFullYear();
const inMonth  = (iso,m,y) => { const dt=new Date(iso+'T00:00:00'); return dt.getMonth()===m && dt.getFullYear()===y; };
const inYear   = (iso,y)   => new Date(iso+'T00:00:00').getFullYear()===y;
const daysInMonth = (m,y) => new Date(y, m+1, 0).getDate();

const weekKey = (d) => {
  const dt = new Date(d); dt.setHours(0,0,0,0);
  dt.setDate(dt.getDate() + 3 - ((dt.getDay() + 6) % 7));
  const w1 = new Date(dt.getFullYear(), 0, 4);
  return dt.getFullYear() + '-' + (1 + Math.round(((dt - w1) / 86400000 - 3 + ((w1.getDay() + 6) % 7)) / 7));
};
const weekStreak = (deals) => {
  if (!deals.length) return 0;
  const weeks = new Set(deals.map(d => weekKey(new Date(d.date + 'T00:00:00'))));
  let streak = 0, cur = new Date();
  while (weeks.has(weekKey(cur))) { streak++; cur = new Date(cur.getTime() - 7*86400000); }
  return streak;
};

const greeting = () => {
  const h = new Date().getHours();
  return h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
};

  const get = (rx) => { const m=txt.match(rx); return m?m[1].trim():''; };
  const rawDate = get(/Date\s*Sold[:\s]+(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4})/i)
               || get(/(?:Sale|Contract|Deal)\s*Date[:\s]+(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4})/i)
               || get(/(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4})/);
  let date = new Date().toISOString().split('T')[0];
  if (rawDate) { const d=new Date(rawDate); if(!isNaN(d)) date=d.toISOString().split('T')[0]; }
  const vehicle = get(/((?:19[5-9]|20[0-2])\d\s+[A-Za-z][A-Za-z\s]{4,40}?)(?:\s*\d+\s*dr|\s*4WD|\s*AWD|\n|VIN|Stock|Mileage)/i)
               || get(/((?:19[5-9]|20[0-2])\d\s+[A-Za-z][A-Za-z\s]{4,40}?)(?:\s{2,})/i);
  const stockNum = get(/Stock\s*(?:Number|#|No\.?)[:\s]+([A-Z0-9\-]{4,14})/i) || get(/Stock[:\s]+([A-Z0-9\-]{4,14})/i);
  const typeRaw = get(/New\s*[\/|]\s*Used[:\s]+(New|Used)/i) || '';
  const type = (typeRaw||txt).toLowerCase().includes('used') ? 'used' : 'new';
  const frontM = txt.match(/Front\s*(?:End\s*)?(?:Gross|Profit)[:\s]+\$?([\d,]+\.?\d*)/i) || txt.match(/Front[:\s]+\$?([\d,]+\.?\d*)/i);
  const front = frontM ? frontM[1].replace(/,/g,'') : '';
  const backIdx = txt.toLowerCase().indexOf('back gross:');
  let back = '';
  if (backIdx >= 0) { const a=txt.slice(backIdx+11); const bm=a.match(/\$?([\d,]+\.\d{2})/); if(bm) back=bm[1].replace(/,/g,''); }
  if (!back) {
    const bm2 = txt.match(/Back\s*(?:End\s*)?(?:Gross|Profit)[:\s]+\$?([\d,]+\.?\d*)/i)
             || txt.match(/F&?\s*I\s*(?:Gross|Income|Total)[:\s]+\$?([\d,]+\.?\d*)/i)
             || txt.match(/Reserve[:\s]+\$?([\d,]+\.?\d*)/i);
    if (bm2) back = bm2[1].replace(/,/g,'');
  }
  const salesperson = get(/Salesperson[:\s]+([A-Za-z][A-Za-z\s]{2,28}?)(?:\n|Date Sold|$)/i);
  const dealNum = get(/DMS\s*ID[:\s]+(\d{4,10})/i) || get(/Deal\s*(?:#|No\.?|Number)[:\s]+([A-Z0-9\-]{3,12})/i);
  const notes = [dealNum?'Deal #'+dealNum:'', salesperson?'Sold by: '+salesperson.trim():''].filter(Boolean).join(' · ');
  return { date, vehicle:(vehicle||'').replace(/\s+/g,' ').trim(), stockNum:stockNum||'', type, front, back, notes };
};

// ── STATS ENGINE ────────────────────────────────────────────────────
const buildStats = (deals, spiffs, plan, goals) => {
  const {m,y} = getMonth();
  const yr = getYear();
  const today = new Date();
  const dim = daysInMonth(m,y);
  const dayOfMonth = today.getDate();

  const mtdDeals  = deals.filter(d=>inMonth(d.date,m,y));
  const ytdDeals  = deals.filter(d=>inYear(d.date,yr));
  const mtdSpiffs = spiffs.filter(s=>inMonth(s.date,m,y));
  const ytdSpiffs = spiffs.filter(s=>inYear(s.date,yr));

  const mtdDealPay  = mtdDeals.reduce((s,d)=>s+calcMyComm(d,plan),0);
  const mtdSpiffPay = mtdSpiffs.reduce((s,sp)=>s+(Number(sp.amount)||0),0);
  const mtdTotal    = mtdDealPay + mtdSpiffPay;
  const ytdTotal    = ytdDeals.reduce((s,d)=>s+calcMyComm(d,plan),0) + ytdSpiffs.reduce((s,sp)=>s+(Number(sp.amount)||0),0);

  const mtdFront = mtdDeals.reduce((s,d)=>s+(Number(d.front)||0),0);
  const mtdBack  = mtdDeals.reduce((s,d)=>s+(Number(d.back)||0),0);
  const frontBackPct = (mtdFront+mtdBack)>0 ? Math.round(mtdFront/(mtdFront+mtdBack)*100) : 0;

  const avgDeal = mtdDeals.length>0 ? Math.round(mtdDealPay/mtdDeals.length) : 0;
  const best = mtdDeals.reduce((b,d)=>{ const c=calcMyComm(d,plan); return c>(b?b.comm:0)?{deal:d,comm:c}:b; }, null);
  const streak = weekStreak(deals);

  // cumulative daily earnings for pace chart
  const daily = Array(dim).fill(0);
  mtdDeals.forEach(d=>{ const dd=new Date(d.date+'T00:00:00').getDate(); daily[dd-1]+=calcMyComm(d,plan); });
  mtdSpiffs.forEach(sp=>{ const dd=new Date(sp.date+'T00:00:00').getDate(); daily[dd-1]+=(Number(sp.amount)||0); });
  let run=0;
  const cumulative = daily.map((v,i)=>{ run+=v; return i < dayOfMonth ? run : null; });

  // last 6 months totals
  const months = [];
  for (let i=5;i>=0;i--) {
    const d = new Date(y, m-i, 1);
    const mm=d.getMonth(), yy=d.getFullYear();
    const tot = deals.filter(x=>inMonth(x.date,mm,yy)).reduce((s,x)=>s+calcMyComm(x,plan),0)
              + spiffs.filter(x=>inMonth(x.date,mm,yy)).reduce((s,x)=>s+(Number(x.amount)||0),0);
    months.push({ label: d.toLocaleDateString('en-US',{month:'short'}), total: tot, current: i===0 });
  }

  const newUnits  = mtdDeals.filter(d=>d.type!=='used').length;
  const usedUnits = mtdDeals.filter(d=>d.type==='used').length;

  // earnings per calendar month of the current year (for the Goals charts)
  const ytdMonthly = Array(12).fill(0);
  ytdDeals.forEach(d=>{ ytdMonthly[new Date(d.date+'T00:00:00').getMonth()] += calcMyComm(d,plan); });
  ytdSpiffs.forEach(sp=>{ ytdMonthly[new Date(sp.date+'T00:00:00').getMonth()] += (Number(sp.amount)||0); });

  const projected = dayOfMonth>0 ? Math.round(mtdTotal/dayOfMonth*dim) : 0;
  const paceDelta = projected - goals.monthlyIncome;

  return { m, y, yr, dim, dayOfMonth, mtdDeals, ytdDeals, mtdSpiffs, ytdSpiffs, ytdMonthly,
           mtdDealPay, mtdSpiffPay, mtdTotal, ytdTotal, mtdFront, mtdBack, frontBackPct,
           avgDeal, best, streak, cumulative, months, newUnits, usedUnits, projected, paceDelta };
};

function Ring({pct, size=120, stroke=9, color='var(--green)', children}) {
  const r = (size-stroke)/2;
  const c = 2*Math.PI*r;
  const p = Math.min(Math.max(pct,0),100);
  return (
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--surface3)" strokeWidth={stroke} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={c} strokeDashoffset={c*(1-p/100)} strokeLinecap="round"
          style={{transition:"stroke-dashoffset 0.6s ease"}} />
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        {children}
      </div>
    </div>
  );
}

// ── IMPORT MODAL ─────────────────────────────────────────────────────
function ImportModal({onClose, onSave, plan}) {
  const [stage, setStage] = useState('pick');
  const [error, setError] = useState(null);
  const [draft, setDraft] = useState(null);
  const pdfRef = useRef(null);
  const imgRef = useRef(null);

  const parse = async (file) => {
    setStage('parsing'); setError(null);
    // 1) Try the AI reader — the same server the iPhone app uses.
    //    Far more accurate than the in-browser fallback below.
    try {
      const b64 = await new Promise((res,rej)=>{ const fr=new FileReader(); fr.onload=e=>res(String(e.target.result).split(',')[1]); fr.onerror=rej; fr.readAsDataURL(file); });
      const mime = file.type || ((file.name||'').endsWith('.pdf') ? 'application/pdf' : 'image/jpeg');
      const resp = await fetch(OCR_SERVER + '/api/ocr', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ imageBase64: b64, mimeType: mime })
      });
      if (resp.ok) {
        const r = await resp.json();
        if ((r.fieldsFound||0) > 0) {
          setDraft({
            date: (r.dateCertain && r.date) ? r.date : new Date().toISOString().split('T')[0],
            vehicle: r.vehicleName||'', stockNum: '', type: r.type==='used'?'used':'new',
            front: r.frontGross||'', back: r.backGross||'',
            split_pct: 100, split_with: '', notes: ''
          });
          setStage('review');
          return;
        }
      }
    } catch(e) { /* server unreachable — fall through to the local reader */ }
    // 2) Fallback: read the file right here in the browser.
    try {
      let text = '';
      if (file.type==='application/pdf' || (file.name && file.name.endsWith('.pdf'))) {
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        if (!pdfjsLib) throw new Error('PDF library not loaded. Refresh and try again.');
        const ab = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({data:ab}).promise;
        for (let p=1; p<=Math.min(pdf.numPages,4); p++) {
          const page = await pdf.getPage(p);
          const tc = await page.getTextContent();
          text += tc.items.map(i=>i.str).join(' ') + '\n';
        }
        if (text.replace(/\s/g,'').length < 80) {
          const page = await pdf.getPage(1);
          const vp = page.getViewport({scale:2.5});
          const canvas = document.createElement('canvas');
          canvas.width=vp.width; canvas.height=vp.height;
          await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
          if (!window.Tesseract) throw new Error('OCR not loaded. Refresh and try again.');
          const r = await window.Tesseract.recognize(canvas.toDataURL(),'eng',{logger:()=>{}});
          text = r.data.text;
        }
      } else {
        if (!window.Tesseract) throw new Error('OCR not loaded. Refresh and try again.');
        const dataUrl = await new Promise((res,rej)=>{ const fr=new FileReader(); fr.onload=e=>res(e.target.result); fr.onerror=rej; fr.readAsDataURL(file); });
        const r = await window.Tesseract.recognize(dataUrl,'eng',{logger:()=>{}});
        text = r.data.text;
      }
      const fields = extractFields(text);
      setDraft(fields);
      setStage('review');
    } catch(e) {
      setError('Could not read file: ' + e.message);
      setStage('pick');
    }
  };

  if (stage==='review' && draft) {
    return <LogDealModal onClose={onClose} onSave={onSave} plan={plan} initial={draft} />;
  }

  return (
    <Modal onClose={onClose} title="Import Deal Sheet">
      {stage==='pick' && (
        <React.Fragment>
          <input ref={pdfRef} type="file" accept=".pdf,application/pdf" onChange={e=>{const f=e.target.files[0];if(f)parse(f);e.target.value='';}} style={{display:"none"}} />
          <input ref={imgRef} type="file" accept="image/*" onChange={e=>{const f=e.target.files[0];if(f)parse(f);e.target.value='';}} style={{display:"none"}} />
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
            <button onClick={()=>imgRef.current&&imgRef.current.click()} style={{padding:"28px 16px",background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:14,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
              <span style={{fontSize:34}}>📸</span>
              <div>
                <div style={{fontSize:14,fontWeight:500,color:"var(--text)",marginBottom:3}}>Photo</div>
                <div style={{fontSize:11,color:"var(--muted)"}}>Camera or image file</div>
              </div>
            </button>
            <button onClick={()=>pdfRef.current&&pdfRef.current.click()} style={{padding:"28px 16px",background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:14,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
              <span style={{fontSize:34}}>📄</span>
              <div>
                <div style={{fontSize:14,fontWeight:500,color:"var(--text)",marginBottom:3}}>PDF</div>
                <div style={{fontSize:11,color:"var(--muted)"}}>Drag or browse</div>
              </div>
            </button>
          </div>
          {error && (
            <div style={{background:"var(--red-bg)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:10,padding:"12px 14px",fontSize:13,color:"var(--red)",marginBottom:12}}>
              {error}
            </div>
          )}
          <div style={{fontSize:11,color:"var(--dim)",textAlign:"center",lineHeight:1.6}}>
            Works with CDK, Reynolds, Elead, DealerSocket and most DMS formats
          </div>
        </React.Fragment>
      )}
      {stage==='parsing' && (
        <div style={{textAlign:"center",padding:"40px 0"}}>
          <div style={{width:48,height:48,border:"3px solid var(--surface3)",borderTopColor:"var(--green)",borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"0 auto 18px"}} />
          <div style={{fontSize:15,fontWeight:500,marginBottom:6}}>Reading deal sheet</div>
          <div style={{fontSize:12,color:"var(--muted)"}}>Photos may take 10–20 seconds</div>
        </div>
      )}
    </Modal>
  );
}

// ── LOG SPIFF MODAL ──────────────────────────────────────────────────
function LogSpiffModal({onClose, onSave}) {
  const [form, setForm] = useState(emptySpiff());
  const s = (k,v) => setForm(f=>({...f,[k]:v}));
  return (
    <Modal onClose={onClose} title="Log Spiff / Bonus">
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div><label style={lbl}>Date</label><input type="date" value={form.date} onChange={e=>s('date',e.target.value)} style={inp} /></div>
        <div><label style={lbl}>Description</label><input value={form.description} onChange={e=>s('description',e.target.value)} placeholder="Model spiff, contest bonus, weekend special…" style={inp} /></div>
        <div><label style={lbl}>Amount ($)</label><input type="number" value={form.amount} onChange={e=>s('amount',e.target.value)} placeholder="500" style={inp} /></div>
      </div>
      <button onClick={()=>{if(!form.amount)return;onSave({...form,id:Date.now(),amount:Number(form.amount)});}} style={{...btn('amber'),marginTop:20}}>
        Save Spiff
      </button>
    </Modal>
  );
}

// ── STAT CARD ───────────────────────────────────────────────────────
function Stat({label, value, sub, color, icon}) {

// ── DASHBOARD ───────────────────────────────────────────────────────
function DashboardView({stats, goals, plan, name, onImport, onLogDeal, onLogSpiff}) {

      responsive: true, maintainAspectRatio: false,

          titleColor:'#aaa', bodyColor:'#f0f0f0', padding:10,
          callbacks: { label: (c)=> fmt(c.parsed.y) }
        }
      },
      scales: {
        x: {grid:{display:false}},
        y: {beginAtZero:true, ticks:{callback:(v)=>fmtK(v), maxTicksLimit:5}}

  const mixRef = useChart(() => ({
    type: 'doughnut',
    data: {
      labels: ['New','Used'],
      datasets: [{

        <div className="card glow" style={{background:"linear-gradient(135deg,#0d1f0f 0%,#0a150b 55%,#111 100%)",border:"1px solid var(--green-border)",padding:"26px 28px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:20,flexWrap:"wrap"}}>
          <div>
            <div style={{fontSize:11,color:"rgba(34,197,94,0.65)",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:12}}>Month-to-Date Earnings</div>

            <div style={{display:"flex",gap:18,flexWrap:"wrap"}}>
              <span style={{fontSize:13,color:"rgba(34,197,94,0.55)"}}>{S.mtdDeals.length} unit{S.mtdDeals.length!==1?'s':''}</span>

          <div>
            <div style={secLbl}>Monthly Goal</div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",margin:"12px 0 8px"}}>
              <span className="num" style={{fontSize:20,fontWeight:700}}>{fmt(S.mtdTotal)}</span>
              <span style={{fontSize:12,color:"var(--muted)"}}>of {fmt(goals.monthlyIncome)}</span>

            <div style={{height:8,background:"var(--surface3)",borderRadius:4,overflow:"hidden"}}>

            <div style={{height:8,background:"var(--surface3)",borderRadius:4,overflow:"hidden"}}>

        <Stat label="Deal Streak" value={S.streak>0?S.streak+'w':'—'} sub="weeks w/ a deal" color={S.streak>2?"var(--amber)":undefined} icon={<Icon d={ICONS.fire} size={15}/>} />
      </div>

      {/* Charts */}
      <div className="grid-charts" style={{marginBottom:14}}>
        <div className="card" style={{padding:"20px 22px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <span style={secLbl}>Earnings Pace — {new Date().toLocaleDateString('en-US',{month:'long'})}</span>
            <span style={{fontSize:11,color:"var(--dim)"}}>solid = earned · dashed = goal pace</span>

          <div style={{height:250}}><canvas ref={paceRef} /></div>

            <div style={{display:"flex",flexDirection:"column"}}>
              {recent.map(d=>(
                <div key={d.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 0",borderBottom:"1px solid var(--border)"}}>
                  <div style={{minWidth:0}}>
                    <div style={{fontSize:13.5,fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",marginBottom:2}}>{d.vehicle||'Vehicle'}</div>
                    <div style={{fontSize:11,color:"var(--muted)"}}>{fmtD(d.date)} · <span style={{color:d.type==='new'?"var(--blue)":"var(--amber)"}}>{d.type==='new'?'New':'Used'}</span></div>
                  </div>
                  <div className="num" style={{fontSize:16,fontWeight:700,color:"var(--green)",flexShrink:0,marginLeft:12}}>{fmt(calcMyComm(d,plan))}</div>
                </div>
              ))}
            </div>
          ) : (
            <div style={{textAlign:"center",padding:"30px 0",color:"var(--dim)",fontSize:13}}>
              No deals this month yet.<br/>Import a sheet or hit + Log Deal.
            </div>
          )}
        </div>
        <div className="card" style={{padding:"20px 22px"}}>
          <div style={{...secLbl,marginBottom:16}}>Year to Date · {S.yr}</div>
          <div className="num" style={{fontSize:38,fontWeight:700,marginBottom:4}}>{fmt(S.ytdTotal)}</div>
          <div style={{fontSize:12,color:"var(--muted)",marginBottom:18}}>{S.ytdDeals.length} units · avg {fmt(S.ytdDeals.length>0?S.ytdTotal/ (new Date().getMonth()+1):0)}/mo</div>

          </div>
          <div style={{fontSize:12,color:"var(--dim)"}}>{goals.yearlyIncome>0?Math.round(S.ytdTotal/goals.yearlyIncome*100):0}% of the year's target banked</div>
        </div>
      </div>
    </div>
  );
}

// ── DEALS VIEW ──────────────────────────────────────────────────────
function DealsView({deals, spiffs, plan, onRemoveDeal, onRemoveSpiff, onEditDeal, onImport, onLogDeal, onLogSpiff}) {
  const isMobile = useIsMobile();
  const [filter, setFilter] = useState('mtd');
  const [q, setQ] = useState('');
  const {m,y} = getMonth();
  const yr = getYear();

  const inPeriod = (iso) => filter==='all' ? true : filter==='mtd' ? inMonth(iso,m,y) : inYear(iso,yr);
  const filteredDeals = deals.filter(d=>inPeriod(d.date) && (!q || (d.vehicle+' '+(d.stockNum||'')+' '+(d.notes||'')).toLowerCase().includes(q.toLowerCase())));
  const filteredSpiffs = spiffs.filter(s=>inPeriod(s.date));
  const sorted = [...filteredDeals].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const totalPay = filteredDeals.reduce((s,d)=>s+calcMyComm(d,plan),0) + filteredSpiffs.reduce((s,sp)=>s+(Number(sp.amount)||0),0);

  const exportCSV = () => {
    const rows = [['Date','Vehicle','Stock #','Type','Front Gross','Back Gross','Split %','Split With','My Commission','Notes']];
    sorted.forEach(d=>rows.push([d.date, d.vehicle, d.stockNum||'', d.type, d.front||0, d.back||0, d.split_pct||100, d.split_with||'', calcMyComm(d,plan), (d.notes||'').replace(/"/g,"'")]));
    const csv = rows.map(r=>r.map(c=>'"'+String(c==null?'':c)+'"').join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    a.download = 'earniq_deals_'+filter+'.csv';
    a.click();
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12,marginBottom:22}}>
        <div style={{fontSize:25,fontWeight:700,letterSpacing:"-0.02em"}}>Deal Log</div>
        <div style={{display:"flex",gap:9,flexWrap:"wrap"}}>
          <button onClick={exportCSV} style={pillBtn()}>⬇ Export CSV</button>
          <button onClick={onImport} style={pillBtn()}>📄 Import</button>
          <button onClick={onLogSpiff} style={pillBtn('amber')}>+ Spiff</button>
          <button onClick={onLogDeal} style={pillBtn('green')}>+ Log Deal</button>
        </div>
      </div>

      <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center",marginBottom:16}}>
        <div style={{display:"flex",gap:8}}>
          {[['mtd','This Month'],['ytd','This Year'],['all','All Time']].map(([k,l])=>(
            <button key={k} onClick={()=>setFilter(k)} style={{padding:"9px 16px",border:`1px solid ${filter===k?"var(--green-border)":"var(--border)"}`,borderRadius:10,background:filter===k?"var(--green-bg)":"var(--surface)",color:filter===k?"var(--green)":"var(--muted)",fontSize:12.5,fontWeight:filter===k?600:400,cursor:"pointer"}}>
              {l}
            </button>
          ))}
        </div>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search vehicle, stock #, notes…" style={{...inp, width:isMobile?"100%":280, padding:"10px 14px"}} />
        <div style={{marginLeft:"auto",display:"flex",alignItems:"baseline",gap:8}}>
          <span style={{fontSize:12,color:"var(--muted)"}}>{filteredDeals.length} deal{filteredDeals.length!==1?'s':''}{filteredSpiffs.length>0?' + '+filteredSpiffs.length+' spiff'+(filteredSpiffs.length!==1?'s':''):''} ·</span>
          <span className="num" style={{fontSize:21,fontWeight:700,color:"var(--green)"}}>{fmt(totalPay)}</span>
        </div>
      </div>

      {/* Table (desktop) / cards (mobile) */}
      {sorted.length>0 ? (
        isMobile ? (
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:28}}>
            {sorted.map(d=>{
              const mine=calcMyComm(d,plan); const capped=isCapped(d,plan); const split=Number(d.split_pct)||100;
              return (
                <div key={d.id} className="card fu" style={{padding:"14px 16px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:14,fontWeight:500,marginBottom:4,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{d.vehicle||'Vehicle'}</div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                        <span style={{fontSize:11,color:"var(--muted)"}}>{fmtD(d.date)}</span>
                        <span style={{fontSize:10,background:d.type==='new'?"var(--blue-bg)":"var(--amber-bg)",color:d.type==='new'?"var(--blue)":"var(--amber)",border:`1px solid ${d.type==='new'?"var(--blue-border)":"var(--amber-border)"}`,borderRadius:5,padding:"1px 7px",fontWeight:500}}>{d.type==='new'?'NEW':'USED'}</span>
                        {capped && <span style={{fontSize:10,background:"var(--amber-bg)",color:"var(--amber)",border:"1px solid var(--amber-border)",borderRadius:5,padding:"1px 7px"}}>⚡</span>}
                        {split<100 && <span style={{fontSize:10,color:"var(--muted)"}}>Split {split}%</span>}
                      </div>
                      {(d.front||d.back) && <div style={{fontSize:11,color:"var(--dim)",marginTop:5}}>{d.front?'F: '+fmt(d.front):''}{d.front&&d.back?' · ':''}{d.back?'B: '+fmt(d.back):''}</div>}
                    </div>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,flexShrink:0}}>
                      <div className="num" style={{fontSize:19,fontWeight:700,color:"var(--green)"}}>{fmt(mine)}</div>
                      <div style={{display:"flex",gap:2}}>

// ── GOALS VIEW ──────────────────────────────────────────────────────
function GoalsView({stats, goals, setGoals}) {
  const S = stats;
  const save = (k,v) => setGoals({...goals,[k]:Number(v)||0});
  const goalPct = goals.monthlyIncome>0 ? Math.round(S.mtdTotal/goals.monthlyIncome*100) : 0;
  const unitPct = goals.monthlyUnits>0 ? Math.round(S.mtdDeals.length/goals.monthlyUnits*100) : 0;
  const yearPct = goals.yearlyIncome>0 ? Math.round(S.ytdTotal/goals.yearlyIncome*100) : 0;
  const remainingDays = S.dim - S.dayOfMonth;
  const needed = Math.max(goals.monthlyIncome - S.mtdTotal, 0);
  const neededDeals = S.avgDeal>0 ? Math.ceil(needed/S.avgDeal) : null;

  const yearRef = useChart(() => {
    const nowM = new Date().getMonth();
    let run = 0;
    const cum = S.ytdMonthly.map((v,i)=>{ if (i>nowM) return null; run += v; return run; });
    return {
      type: 'line',
      data: {
        labels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
        datasets: [
          {
            label: 'Earned', data: cum, borderColor: '#f59e0b',
            backgroundColor: (ctx) => { const g = ctx.chart.ctx.createLinearGradient(0,0,0,ctx.chart.height||230); g.addColorStop(0,'rgba(245,158,11,0.25)'); g.addColorStop(1,'rgba(245,158,11,0)'); return g; },
            fill: true, tension: 0.35, borderWidth: 2.5,
            pointRadius: (c)=> c.dataIndex===nowM ? 4 : 0, pointBackgroundColor: '#f59e0b',
          },
          {
            label: 'Goal pace', data: Array.from({length:12},(_,i)=>Math.round(goals.yearlyIncome*(i+1)/12)),
            borderColor: 'rgba(255,255,255,0.22)', borderDash: [5,5], borderWidth: 1.5, pointRadius: 0, fill: false, tension: 0,
          }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false, interaction: {mode:'index', intersect:false},
        plugins: {
          legend: {display:false},
          tooltip: { backgroundColor:'#181818', borderColor:'rgba(255,255,255,0.1)', borderWidth:1, titleColor:'#aaa', bodyColor:'#f0f0f0', padding:10,
            callbacks: { label: (c)=> c.dataset.label+': '+fmt(c.parsed.y) } }
        },
        scales: { x: {grid:{display:false}}, y: {beginAtZero:true, ticks:{callback:(v)=>fmtK(v), maxTicksLimit:6}} }
      }
    };
  }, [JSON.stringify(S.ytdMonthly), goals.yearlyIncome]);

  const hitRef = useChart(() => ({
    type: 'bar',
    data: {
      labels: S.months.map(mm=>mm.label),
      datasets: [
        { type:'line', label:'Goal', data: S.months.map(()=>goals.monthlyIncome),
          borderColor:'rgba(255,255,255,0.25)', borderDash:[5,5], borderWidth:1.5, pointRadius:0 },
        { label:'Earned', data: S.months.map(mm=>mm.total),
          backgroundColor: S.months.map(mm=>mm.total>=goals.monthlyIncome?'#22c55e':'rgba(255,255,255,0.14)'),
          borderRadius:7, borderSkipped:false, maxBarThickness:46 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: {display:false},
        tooltip: { backgroundColor:'#181818', borderColor:'rgba(255,255,255,0.1)', borderWidth:1, titleColor:'#aaa', bodyColor:'#f0f0f0', padding:10,
          callbacks: { label: (c)=> (c.dataset.label||'')+': '+fmt(c.parsed.y) } }
      },
      scales: { x: {grid:{display:false}}, y: {beginAtZero:true, ticks:{callback:(v)=>fmtK(v), maxTicksLimit:5}} }
    }
  }), [JSON.stringify(S.months), goals.monthlyIncome]);

  const GoalCard = ({label, field, value, pct, current, target, color, prefix='$'}) => (
    <div className="card" style={{padding:"22px 24px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <span style={secLbl}>{label}</span>
        <span className="num" style={{fontSize:13,fontWeight:700,color}}>{pct}%</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:20,marginBottom:16}}>
        <Ring pct={pct} size={86} stroke={7} color={color}>
          <div className="num" style={{fontSize:16,fontWeight:700,color}}>{pct}%</div>
        </Ring>
        <div>
          <div className="num" style={{fontSize:24,fontWeight:700,marginBottom:2}}>{current}</div>
          <div style={{fontSize:12,color:"var(--muted)"}}>of {target}</div>
        </div>
      </div>
      <label style={lbl}>Set target</label>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        {prefix && <span style={{color:"var(--muted)",fontSize:14}}>{prefix}</span>}
        <input type="number" defaultValue={value} key={value} onBlur={e=>save(field,e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter')e.target.blur();}} style={inp} />

  return (
    <div>
      <div style={{fontSize:25,fontWeight:700,letterSpacing:"-0.02em",marginBottom:6}}>Goals & Pacing</div>
      <div style={{fontSize:13,color:"var(--muted)",marginBottom:24}}>Targets save automatically. Press Enter or click away to lock a change in.</div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(290px,1fr))",gap:14,marginBottom:14}}>
        <GoalCard label="Monthly Income" field="monthlyIncome" value={goals.monthlyIncome} pct={goalPct} current={fmt(S.mtdTotal)} target={fmt(goals.monthlyIncome)} color="var(--green)" />
        <GoalCard label="Monthly Units" field="monthlyUnits" value={goals.monthlyUnits} pct={unitPct} current={S.mtdDeals.length} target={goals.monthlyUnits+' units'} color="var(--blue)" prefix="" />
        <GoalCard label="Yearly Income" field="yearlyIncome" value={goals.yearlyIncome} pct={yearPct} current={fmt(S.ytdTotal)} target={fmt(goals.yearlyIncome)} color="var(--amber)" />

      <div className="grid-2" style={{marginBottom:14}}>
        <div className="card" style={{padding:"20px 22px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:6}}>
            <span style={secLbl}>The Year So Far · {S.yr}</span>
            <span style={{fontSize:11,color:"var(--dim)"}}>solid = earned · dashed = goal pace</span>
          </div>
          <div style={{height:230}}><canvas ref={yearRef} /></div>
        </div>
        <div className="card" style={{padding:"20px 22px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:6}}>
            <span style={secLbl}>Months Won — Last 6</span>
            <span style={{fontSize:11,color:"var(--dim)"}}>green = beat your goal</span>
          </div>
          <div style={{height:230}}><canvas ref={hitRef} /></div>
        </div>
      </div>

      <div className="card" style={{padding:"22px 24px"}}>
        <div style={{...secLbl,marginBottom:16}}>Pace Report — {new Date().toLocaleDateString('en-US',{month:'long'})}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:14}}>
          <div>
            <div style={{fontSize:11,color:"var(--muted)",marginBottom:6}}>Projected finish</div>
            <div className="num" style={{fontSize:26,fontWeight:700,color:S.paceDelta>=0?"var(--green)":"var(--amber)"}}>{fmt(S.projected)}</div>
          </div>
          <div>
            <div style={{fontSize:11,color:"var(--muted)",marginBottom:6}}>vs. goal</div>
            <div className="num" style={{fontSize:26,fontWeight:700,color:S.paceDelta>=0?"var(--green)":"var(--red)"}}>{S.paceDelta>=0?'+':'−'}{fmt(Math.abs(S.paceDelta))}</div>
          </div>
          <div>
            <div style={{fontSize:11,color:"var(--muted)",marginBottom:6}}>Days left</div>
            <div className="num" style={{fontSize:26,fontWeight:700}}>{remainingDays}</div>
          </div>
          <div>
            <div style={{fontSize:11,color:"var(--muted)",marginBottom:6}}>To hit goal</div>
            <div className="num" style={{fontSize:26,fontWeight:700}}>{needed===0?'✓ Done':neededDeals!=null?neededDeals+' deals':fmt(needed)}</div>
            {needed>0 && neededDeals!=null && <div style={{fontSize:11,color:"var(--dim)",marginTop:3}}>at your {fmt(S.avgDeal)} average</div>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── WASHOUT BINDER ──────────────────────────────────────────────────
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function WashoutUploadModal({onClose, onSaved, uid}) {
  const now = new Date();
  const [month, setMonth] = useState(now.getMonth()+1);
  const [year, setYear]   = useState(now.getFullYear());
  const [notes, setNotes] = useState('');
  const [file, setFile]   = useState(null);
  const [busy, setBusy]   = useState(false);
  const [error, setError] = useState(null);
  const fileRef = useRef(null);
  const years = Array.from({length:6},(_,i)=>now.getFullYear()-i);

  const save = async () => {
    if (!file) { setError('Pick a photo or PDF of your washout sheet first.'); return; }
    setBusy(true); setError(null);
    try {
      const ext = (file.name && file.name.includes('.')) ? file.name.split('.').pop().toLowerCase() : 'jpg';
      const path = uid + '/' + year + '-' + String(month).padStart(2,'0') + '-' + Date.now() + '.' + ext;
      const up = await sb.storage.from('washouts').upload(path, file, {contentType: file.type || undefined});
      if (up.error) throw up.error;
      const ins = await sb.from('washouts').insert({user_id:uid, month, year, file_path:path, mime_type:file.type||'', notes}).select().single();
      if (ins.error) throw ins.error;
      onSaved(ins.data);
    } catch(e) { setError('Upload failed: ' + (e.message||'unknown error')); setBusy(false); }
  };

  return (
    <Modal onClose={onClose} title="Add Washout Sheet">
      <input ref={fileRef} type="file" accept="image/*,.pdf,application/pdf" onChange={e=>{const f=e.target.files[0]; if(f) setFile(f); e.target.value='';}} style={{display:"none"}} />
      <button onClick={()=>fileRef.current&&fileRef.current.click()} style={{width:"100%",padding:"26px 16px",background:"var(--surface2)",border:`1px dashed ${file?"var(--green-border)":"var(--border2)"}`,borderRadius:14,cursor:"pointer",marginBottom:16,color:"var(--text)"}}>
        <div style={{fontSize:30,marginBottom:8}}>{file?'📎':'📄'}</div>
        <div style={{fontSize:14,fontWeight:500,marginBottom:3}}>{file ? (file.name||'Sheet selected') : 'Tap to choose photo or PDF'}</div>
        <div style={{fontSize:11,color:"var(--muted)"}}>{file ? 'Tap again to swap it' : 'The month-end sheet your manager gave you'}</div>
      </button>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
        <div>
          <label style={lbl}>Month</label>
          <select value={month} onChange={e=>setMonth(Number(e.target.value))} style={inp}>
            {MONTH_NAMES.map((mn,i)=><option key={mn} value={i+1}>{mn}</option>)}
          </select>
        </div>
        <div>
          <label style={lbl}>Year</label>
          <select value={year} onChange={e=>setYear(Number(e.target.value))} style={inp}>
            {years.map(yy=><option key={yy} value={yy}>{yy}</option>)}
          </select>
        </div>
      </div>
      <div style={{marginBottom:4}}>
        <label style={lbl}>Notes (optional)</label>
        <input value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Bonus month, disputed spiff, etc." style={inp} />
      </div>
      {error && (
        <div style={{background:"var(--red-bg)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:10,padding:"11px 14px",fontSize:12.5,color:"var(--red)",marginTop:12}}>{error}</div>
      )}
      <button disabled={busy} onClick={save} style={{...btn('green'),marginTop:18,opacity:busy?0.6:1}}>
        {busy ? 'Uploading…' : 'File it in the binder'}
      </button>
    </Modal>
  );
}

function WashoutView({uid}) {
  const [sheets, setSheets] = useState(null); // null = still loading
  const [showUpload, setShowUpload] = useState(false);
  const [viewing, setViewing] = useState(null); // {sheet, url}
  const [err, setErr] = useState(null);

  useEffect(()=>{ (async()=>{
    const {data, error} = await sb.from('washouts').select('*')
      .order('year',{ascending:false}).order('month',{ascending:false}).order('created_at',{ascending:false});
    if (error) { setErr('Could not load your binder: '+error.message); setSheets([]); return; }
    setSheets(data||[]);
  })(); }, [uid]);

  const openSheet = async (sh) => {
    const {data, error} = await sb.storage.from('washouts').createSignedUrl(sh.file_path, 3600);
    if (error) { setErr('Could not open sheet: '+error.message); return; }
    if ((sh.mime_type||'').includes('pdf') || sh.file_path.endsWith('.pdf')) window.open(data.signedUrl, '_blank');
    else setViewing({sheet:sh, url:data.signedUrl});
  };
  const removeSheet = async (sh) => {
    if (!window.confirm('Remove this washout sheet from your binder?')) return;

    setSheets(prev=>prev.filter(x=>x.id!==sh.id));
  };

  const byYear = {};
  (sheets||[]).forEach(sh=>{ (byYear[sh.year] = byYear[sh.year]||[]).push(sh); });
  const years = Object.keys(byYear).sort((a,b)=>b-a);

  return (

      ) : (
        years.map(yy=>(
          <div key={yy} style={{marginBottom:26}}>
            <div style={{...secLbl,marginBottom:12}}>{yy}</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:12}}>
              {byYear[yy].map(sh=>(
                <div key={sh.id} className="card fu" style={{padding:"16px 18px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div>
                      <div style={{fontSize:15,fontWeight:600}}>{MONTH_NAMES[sh.month-1]}</div>
                      <div style={{fontSize:11,color:"var(--dim)",marginTop:2}}>Added {fmtD(sh.created_at.split('T')[0])}</div>
                    </div>
                    <span style={{fontSize:20}}>📒</span>
                  </div>
                  {sh.notes && <div style={{fontSize:12,color:"var(--muted)",marginBottom:10,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{sh.notes}</div>}
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>openSheet(sh)} style={{...pillBtn(),flex:1}}>View sheet</button>
                    <button onClick={()=>removeSheet(sh)} title="Remove" style={{background:"none",border:"none",color:"var(--dim)",fontSize:13,cursor:"pointer",padding:"2px 6px"}}>✕</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        ))
      )}

      {showUpload && <WashoutUploadModal uid={uid} onClose={()=>setShowUpload(false)} onSaved={(row)=>{ setSheets(prev=>[row,...(prev||[])].sort((a,b)=>b.year-a.year || b.month-a.month)); setShowUpload(false); }} />}
      {viewing && (
        <Modal onClose={()=>setViewing(null)} title={MONTH_NAMES[viewing.sheet.month-1]+' '+viewing.sheet.year+' washout'} maxWidth={720}>
          <img src={viewing.url} alt="Washout sheet" style={{width:"100%",borderRadius:12,border:"1px solid var(--border2)"}} />

      {err && (
        <div onClick={()=>setErr(null)} style={{position:"fixed",bottom:18,right:18,zIndex:800,background:"var(--red-bg)",border:"1px solid rgba(239,68,68,0.35)",color:"var(--red)",borderRadius:12,padding:"13px 16px",fontSize:13,maxWidth:340,cursor:"pointer"}}>
          {err} <span style={{color:"var(--dim)",marginLeft:6}}>✕</span>

    </div>
  );

function AuthScreen() {
  const [mode, setMode] = useState('signin'); // signin | signup | forgot
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [name, setName] = useState('');
  const [msg, setMsg] = useState(null);   // {type:'error'|'ok', text}
  const [busy, setBusy] = useState(false);

  const submit = async () => {
    if (busy) return;
    setMsg(null);
    if (!email.trim()) { setMsg({type:'error',text:'Enter your email address.'}); return; }
    setBusy(true);
    try {
      if (mode === 'signin') {
        const {error} = await sb.auth.signInWithPassword({email:email.trim(), password});
        if (error) setMsg({type:'error',text:error.message});
      } else if (mode === 'signup') {
        if (password.length < 6) { setMsg({type:'error',text:'Password needs at least 6 characters.'}); setBusy(false); return; }
        const {data, error} = await sb.auth.signUp({email:email.trim(), password, options:{data:{name:name.trim()}}});
        if (error) setMsg({type:'error',text:error.message});
        else if (!data.session) setMsg({type:'ok',text:'Almost done — check your email and click the confirmation link, then sign in.'});
      } else {
        const {error} = await sb.auth.resetPasswordForEmail(email.trim(), {redirectTo: window.location.origin});
        setMsg(error ? {type:'error',text:error.message} : {type:'ok',text:'Reset link sent — check your email.'});
      }
    } catch(e) { setMsg({type:'error',text:e.message}); }
    setBusy(false);
  };

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div className="fu" style={{width:"100%",maxWidth:400}}>
        <div style={{textAlign:"center",marginBottom:26}}>
          <img src={LOGO} alt="EarnIQ" style={{width:64,height:64,borderRadius:15,marginBottom:14}} />
          <div style={{fontSize:26,fontWeight:800,letterSpacing:"-0.02em"}}>Earn<span style={{color:"var(--green)"}}>IQ</span></div>
          <div style={{fontSize:12,color:"var(--muted)",marginTop:4}}>Your commission, always on track</div>
        </div>
        <div className="card" style={{padding:"24px 22px"}}>
          {mode!=='forgot' && (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:18}}>
              {[['signin','Sign In'],['signup','Create Account']].map(([k,l])=>(
                <button key={k} onClick={()=>{setMode(k);setMsg(null);}} style={{padding:"11px",border:`1px solid ${mode===k?"var(--green-border)":"var(--border2)"}`,borderRadius:10,background:mode===k?"var(--green-bg)":"var(--surface3)",color:mode===k?"var(--green)":"var(--muted)",fontSize:13,fontWeight:mode===k?600:400,cursor:"pointer"}}>
                  {l}
                </button>
              ))}
            </div>
          )}
          {mode==='forgot' && <div style={{fontSize:14,fontWeight:600,marginBottom:16}}>Reset your password</div>}
          <div style={{display:"flex",flexDirection:"column",gap:13}}>
            {mode==='signup' && (
              <div><label style={lbl}>Your Name</label>
                <input value={name} onChange={e=>setName(e.target.value)} placeholder="John Smith" style={inp} /></div>
            )}
            <div><label style={lbl}>Email</label>
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" style={inp}
                onKeyDown={e=>{if(e.key==='Enter')submit();}} /></div>
            {mode!=='forgot' && (
              <div><label style={lbl}>Password</label>
                <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" style={inp}
                  onKeyDown={e=>{if(e.key==='Enter')submit();}} /></div>
            )}
          </div>
          {msg && (
            <div style={{marginTop:14,background:msg.type==='error'?"var(--red-bg)":"var(--green-bg)",border:`1px solid ${msg.type==='error'?"rgba(239,68,68,0.25)":"var(--green-border)"}`,borderRadius:10,padding:"11px 13px",fontSize:13,color:msg.type==='error'?"var(--red)":"var(--green)",lineHeight:1.5}}>
              {msg.text}
            </div>
          )}
          <button onClick={submit} disabled={busy} style={{...btn('green'),marginTop:18,opacity:busy?0.6:1}}>
            {busy?'One moment…': mode==='signin'?'Sign In': mode==='signup'?'Create Account':'Send Reset Link'}
          </button>
          <div style={{textAlign:"center",marginTop:14}}>
            {mode==='forgot'
              ? <span onClick={()=>{setMode('signin');setMsg(null);}} style={{fontSize:12,color:"var(--muted)",cursor:"pointer",textDecoration:"underline"}}>Back to sign in</span>
              : mode==='signin' && <span onClick={()=>{setMode('forgot');setMsg(null);}} style={{fontSize:12,color:"var(--muted)",cursor:"pointer",textDecoration:"underline"}}>Forgot password?</span>}
          </div>
        </div>
        <div style={{fontSize:11,color:"var(--dim)",textAlign:"center",marginTop:16,lineHeight:1.6}}>
          Your deals are stored securely in your account and<br/>are never visible to anyone but you.
        </div>
      </div>
    </div>
  );
}

  };

      const [p, d, s, st, subq] = await Promise.all([
        sb.from('profiles').select('*').eq('id',uid).single(),
        sb.from('deals').select('*').order('date',{ascending:false}),
        sb.from('spiffs').select('*').order('date',{ascending:false}),
        sb.from('settings').select('*').eq('user_id',uid).maybeSingle(),
        sb.from('subscriptions').select('*').eq('user_id',uid).maybeSingle(),
      ]);
      if (p.data) setProfile({ name: p.data.name || (session.user.email||'').split('@')[0], role: p.data.role });
      if (subq.data) setSubscription(subq.data);
      setDeals((d.data||[]).map(rowToDeal));
      setSpiffs((s.data||[]).map(rowToSpiff));
      const cp = st.data && st.data.plan  && Object.keys(st.data.plan).length  ? {...DEFAULT_PLAN,  ...st.data.plan}  : null;
      const cg = st.data && st.data.goals && Object.keys(st.data.goals).length ? {...DEFAULT_GOALS, ...st.data.goals} : null;
      let nextPlan = cp, nextGoals = cg;
      if (!cp) { try { const lp = JSON.parse(ls.getItem('earniq_plan')||'null');  if (lp) nextPlan  = {...DEFAULT_PLAN, ...lp}; } catch(e){} }
      if (!cg) { try { const lg = JSON.parse(ls.getItem('earniq_goals')||'null'); if (lg) nextGoals = {...DEFAULT_GOALS, ...lg}; } catch(e){} }
      if (nextPlan)  { setPlanState(nextPlan);   planRef.current  = nextPlan; }
      if (nextGoals) { setGoalsState(nextGoals); goalsRef.current = nextGoals; }
      if ((!cp && nextPlan) || (!cg && nextGoals)) syncSettings();
      // offer one-time import of deals saved in this browser before accounts existed
      if (!ls.getItem('earniq_migrated_'+uid) && (d.data||[]).length===0) {
        let localDeals=[], localSpiffs=[];
        try { localDeals  = JSON.parse(ls.getItem('earniq_deals')||'[]'); }  catch(e){}
        try { localSpiffs = JSON.parse(ls.getItem('earniq_spiffs')||'[]'); } catch(e){}
        if (localDeals.length>0 || localSpiffs.length>0) setMigrate({deals:localDeals, spiffs:localSpiffs});
      }
      sb.from('profiles').update({last_active:new Date().toISOString()}).eq('id',uid).then(()=>{});
      setLoaded(true);
    } catch(e) { oops('Could not load your data')(e); setLoaded(true); }
  })(); }, [uid]);

  const runImport = async () => {
    try {
      const dRows = migrate.deals.map(d=>dealToRow(d,uid));
      const sRows = migrate.spiffs.map(s=>({user_id:uid, date:s.date, description:s.description||'', amount:Number(s.amount)||0}));
      if (dRows.length) {
        const {data,error} = await sb.from('deals').insert(dRows).select();
        if (error) throw error;
        setDeals((data||[]).map(rowToDeal).sort((a,b)=>new Date(b.date)-new Date(a.date)));
      }
      if (sRows.length) {
        const {data,error} = await sb.from('spiffs').insert(sRows).select();
        if (error) throw error;
        setSpiffs((data||[]).map(rowToSpiff));
      }
      ls.setItem('earniq_migrated_'+uid, '1');
      setMigrate(null);
    } catch(e) { oops('Import failed')(e); }
  };
  const skipImport = () => { ls.setItem('earniq_migrated_'+uid,'1'); setMigrate(null); };

  const addDeal = async (d) => {
    setShowLogDeal(false); setShowImport(false);
    const {data,error} = await sb.from('deals').insert(dealToRow(d,uid)).select().single();
    if (error) { oops('Could not save deal')(error); return; }
    setDeals(prev=>[rowToDeal(data),...prev]);
  };
  const updateDeal = async (d) => {
    setEditDeal(null);
    const {data,error} = await sb.from('deals').update(dealToRow(d,uid)).eq('id',d.id).select().single();
    if (error) { oops('Could not update deal')(error); return; }
    setDeals(prev=>prev.map(x=>x.id===d.id?rowToDeal(data):x).sort((a,b)=>new Date(b.date)-new Date(a.date)));
  };
  const removeDeal = async (id) => {
    if (!window.confirm('Remove this deal?')) return;
    const {error} = await sb.from('deals').delete().eq('id',id);
    if (error) { oops('Could not remove deal')(error); return; }
    setDeals(prev=>prev.filter(d=>d.id!==id));
  };
  const addSpiff = async (s) => {
    setShowLogSpiff(false);
    const {data,error} = await sb.from('spiffs').insert({user_id:uid, date:s.date, description:s.description||'', amount:Number(s.amount)||0}).select().single();
    if (error) { oops('Could not save spiff')(error); return; }
    setSpiffs(prev=>[rowToSpiff(data),...prev]);
  };
  const removeSpiff = async (id) => {
    if (!window.confirm('Remove this spiff?')) return;
    const {error} = await sb.from('spiffs').delete().eq('id',id);
    if (error) { oops('Could not remove spiff')(error); return; }
    setSpiffs(prev=>prev.filter(s=>s.id!==id));
  };
  const signOut = () => sb.auth.signOut();

  // Returning from Stripe checkout: show a welcome, then poll until the
  // webhook has marked the account Pro (usually a few seconds).
  useEffect(()=>{
    const q = new URLSearchParams(window.location.search);
    if (!q.get('checkout')) return;
    const wasSuccess = q.get('checkout')==='success';
    window.history.replaceState({}, '', window.location.pathname);
    if (!wasSuccess) return;
    setJustUpgraded(true);
    let tries = 0;
    const t = setInterval(async ()=>{
      tries++;
      const {data} = await sb.from('subscriptions').select('*').eq('user_id',uid).maybeSingle();
      if (data && isProSub(data)) { setSubscription(data); clearInterval(t); }
      else if (tries >= 15) clearInterval(t);
    }, 2000);
    return ()=>clearInterval(t);
  }, [uid]);

  const stats = useMemo(()=>buildStats(deals,spiffs,plan,goals), [deals,spiffs,plan,goals]);
  const isAdmin = profile.role==='admin';
  const hasPro = isAdmin || isProSub(subscription);
  const atFreeLimit = !hasPro && deals.length >= FREE_DEAL_LIMIT;
  const gateDeal = (open) => () => { if (atFreeLimit) { setShowUpgrade(true); return; } open(true); };
  const actions = { onImport:gateDeal(setShowImport), onLogDeal:gateDeal(setShowLogDeal), onLogSpiff:()=>setShowLogSpiff(true) };

  return (
    <div>
      <Sidebar view={view} setView={setView} name={profile.name} setName={saveName} mtdTotal={stats.mtdTotal} isAdmin={isAdmin} onSignOut={signOut} email={session.user.email} />
      <div id="main">
        <div className="container">
          {justUpgraded && hasPro && (
            <div className="card fu" style={{border:"1px solid var(--green-border)",background:"var(--green-bg)",padding:"14px 18px",marginBottom:18,display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
              <div style={{fontSize:13.5,color:"var(--green)",fontWeight:600}}>🎉 Welcome to EarnIQ Pro — unlimited deals unlocked.</div>
              <button onClick={()=>setJustUpgraded(false)} style={{background:"none",border:"none",color:"var(--green)",cursor:"pointer",fontSize:13}}>✕</button>
            </div>
          )}
          {justUpgraded && !hasPro && (
            <div className="card fu" style={{border:"1px solid var(--border2)",padding:"14px 18px",marginBottom:18,fontSize:13.5,color:"var(--muted)"}}>
              Payment received — activating your Pro account, this usually takes a few seconds…
            </div>
          )}
          {!hasPro && loaded && deals.length >= FREE_DEAL_LIMIT - 5 && (
            <div className="card fu" style={{border:"1px solid var(--amber-border)",padding:"14px 18px",marginBottom:18,display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
              <div style={{fontSize:13.5,lineHeight:1.5}}>
                {atFreeLimit
                  ? <span><b style={{color:"var(--amber)"}}>You've used all {FREE_DEAL_LIMIT} free deals.</b> Upgrade to keep logging.</span>
                  : <span><b style={{color:"var(--amber)"}}>{FREE_DEAL_LIMIT - deals.length} free deal{FREE_DEAL_LIMIT - deals.length!==1?'s':''} left.</b> Pro is unlimited.</span>}
              </div>
              <button onClick={()=>setShowUpgrade(true)} style={pillBtn('green')}>⚡ Upgrade to Pro</button>
            </div>
          )}
          {migrate && (
            <div className="card fu" style={{border:"1px solid var(--green-border)",padding:"16px 18px",marginBottom:18,display:"flex",justifyContent:"space-between",alignItems:"center",gap:14,flexWrap:"wrap"}}>
              <div style={{fontSize:13.5,lineHeight:1.5}}>
                Found <b>{migrate.deals.length} deal{migrate.deals.length!==1?'s':''}</b>{migrate.spiffs.length>0?<span> and <b>{migrate.spiffs.length} spiff{migrate.spiffs.length!==1?'s':''}</b></span>:null} saved in this browser from before you had an account. Want to bring them into your account?
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={skipImport} style={pillBtn()}>Not now</button>
                <button onClick={runImport} style={pillBtn('green')}>Import to my account</button>
              </div>
            </div>
          )}
          {!loaded ? (
            <div style={{textAlign:"center",padding:"120px 0"}}>
              <div style={{width:44,height:44,border:"3px solid var(--surface3)",borderTopColor:"var(--green)",borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"0 auto 16px"}} />
              <div style={{fontSize:13,color:"var(--muted)"}}>Loading your numbers…</div>
            </div>
          ) : (
            <React.Fragment>
              {view==='dash'    && <DashboardView stats={stats} goals={goals} plan={plan} name={profile.name} {...actions} />}
              {view==='deals'   && <DealsView deals={deals} spiffs={spiffs} plan={plan} onRemoveDeal={removeDeal} onRemoveSpiff={removeSpiff} onEditDeal={setEditDeal} {...actions} />}
              {view==='goals'   && <GoalsView stats={stats} goals={goals} setGoals={saveGoals} />}
              {view==='payplan' && <PayPlanView plan={plan} setPlan={savePlan} />}
              {view==='binder'  && <WashoutView uid={uid} />}
              {view==='admin'   && isAdmin && <AdminView />}
            </React.Fragment>
          )}
        </div>
      </div>
      <MobileNav view={view} setView={setView} isAdmin={isAdmin} />
      {showImport   && <ImportModal   onClose={()=>setShowImport(false)}   onSave={addDeal}   plan={plan} />}
      {showLogDeal  && <LogDealModal  onClose={()=>setShowLogDeal(false)}  onSave={addDeal}   plan={plan} />}
      {showLogSpiff && <LogSpiffModal onClose={()=>setShowLogSpiff(false)} onSave={addSpiff} />}
      {showUpgrade  && <UpgradeModal  onClose={()=>setShowUpgrade(false)} dealCount={deals.length} />}
      {editDeal     && <LogDealModal  onClose={()=>setEditDeal(null)} onSave={updateDeal} plan={plan} editing={editDeal} />}
      {recovery && <NewPasswordModal onDone={clearRecovery} />}
      {err && (
        <div onClick={()=>setErr(null)} style={{position:"fixed",bottom:18,right:18,zIndex:800,background:"var(--red-bg)",border:"1px solid rgba(239,68,68,0.35)",color:"var(--red)",borderRadius:12,padding:"13px 16px",fontSize:13,maxWidth:340,cursor:"pointer",backdropFilter:"blur(6px)"}}>
          {err} <span style={{color:"var(--dim)",marginLeft:6}}>✕</span>
        </div>
      )}
    </div>
  );
}

// ── APP ROOT ─────────────────────────────────────────────────────────
function App() {
  const [session, setSession]   = useState(undefined); // undefined = checking
  const [recovery, setRecovery] = useState(false);

  useEffect(()=>{
    if (!sb) return;
    sb.auth.getSession().then(({data})=>setSession(data.session||null));
    const {data:sub} = sb.auth.onAuthStateChange((event, s)=>{
      if (event==='PASSWORD_RECOVERY') setRecovery(true);
      setSession(s||null);
    });
    return ()=>{ try{sub.subscription.unsubscribe();}catch(e){} };
  },[]);

  if (!sb) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{textAlign:"center",maxWidth:360}}>
        <div style={{fontSize:16,fontWeight:600,marginBottom:8}}>Connection problem</div>
        <div style={{fontSize:13,color:"var(--muted)",lineHeight:1.6}}>EarnIQ couldn't reach its servers. Check your internet connection and refresh the page.</div>
      </div>
    </div>
  );
  if (session===undefined) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{width:44,height:44,border:"3px solid var(--surface3)",borderTopColor:"var(--green)",borderRadius:"50%",animation:"spin 0.8s linear infinite"}} />
    </div>
  );
  if (!session) return <AuthScreen />;
  return <Workspace key={session.user.id} session={session} recovery={recovery} clearRecovery={()=>setRecovery(false)} />;
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
